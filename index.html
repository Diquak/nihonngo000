<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オノマトペ図鑑 ・ 語帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FF4D8D; --pink2:#FF8FB8; --lilac:#B589F6; --sky:#7FD8F5;
    --yellow:#FFD84D; --red:#FF5C5C; --ink:#3A2E4D; --paper:#FFFFFF;
    --bg1:#FFF0F6; --bg2:#F1E7FF; --line:#3A2E4D;
    --shadow:4px 4px 0 var(--ink);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; color:var(--ink);
    font-family:"Zen Maru Gothic","PingFang TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(127,216,245,.35), transparent 60%),
      radial-gradient(1000px 500px at 0% 110%, rgba(255,77,141,.18), transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100vh; overflow-x:hidden;
  }
  .jp{font-family:"Mochiy Pop One","Zen Maru Gothic",sans-serif;}
  .wrap{max-width:1080px; margin:0 auto; padding:18px 16px 80px;}

  .sparkles{position:fixed; inset:0; pointer-events:none; z-index:0;}
  .sparkles span{position:absolute; font-size:18px; opacity:.7; animation:tw 3s ease-in-out infinite;}
  @keyframes tw{0%,100%{transform:scale(.6) rotate(0);opacity:.25}50%{transform:scale(1.1) rotate(20deg);opacity:.9}}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--ink);color:#fff;padding:11px 22px;border-radius:999px;
    font-family:inherit;font-weight:700;font-size:13px;z-index:200;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;
    box-shadow:4px 4px 0 rgba(0,0,0,.25);}
  .toast.up{transform:translateX(-50%) translateY(0);}

  .statsbar{position:relative;z-index:1;display:flex;align-items:center;flex-wrap:wrap;gap:8px;
    justify-content:center;margin:0 0 10px;font-size:12.5px;font-weight:700;}
  .statsbar .sv{display:flex;align-items:center;gap:4px;background:#fff;border:2.5px solid var(--ink);
    border-radius:999px;padding:5px 13px;box-shadow:2px 2px 0 var(--ink);
    font-family:inherit;font-size:12.5px;font-weight:700;}
  #clearAll{cursor:pointer;transition:transform .08s;}
  #clearAll:active{transform:translate(1px,1px);box-shadow:none;}

  header{position:relative; z-index:1; text-align:center; padding:14px 6px 6px;}
  .badge{display:inline-flex; align-items:center; gap:6px; background:var(--ink); color:#fff;
    font-weight:700; font-size:12px; letter-spacing:.04em; padding:6px 12px; border-radius:999px;
    box-shadow:var(--shadow); transform:rotate(-2deg);}
  h1{font-size:clamp(30px,7vw,52px); margin:14px 0 4px; line-height:1.05; color:var(--ink);}
  h1 .horn{color:var(--red);}
  h1 .hl{color:var(--pink); text-shadow:2px 2px 0 #fff, 4px 4px 0 var(--lilac);}
  .sub{font-size:14px; font-weight:700; opacity:.8;}

  .feature{position:relative; z-index:1; margin:18px auto 8px; max-width:520px;
    background:var(--paper); border:3px solid var(--line); border-radius:26px;
    box-shadow:7px 7px 0 var(--ink); padding:18px 18px 16px; text-align:center;}
  .feature .tag{display:inline-block; background:var(--yellow); border:2px solid var(--ink);
    border-radius:999px; font-weight:900; font-size:12px; padding:3px 12px; transform:rotate(-1.5deg); margin-bottom:6px;}
  .feature .fe{font-size:74px; line-height:1; display:inline-block; margin:4px 0 2px;}
  .feature .fk{font-size:34px; margin:2px 0;}
  .feature .fm{font-size:15px; font-weight:700; color:var(--pink);}
  .feature .fx{font-size:13px; opacity:.78; margin-top:8px; line-height:1.55;}
  .reroll{margin-top:12px; background:var(--pink); color:#fff; border:3px solid var(--ink);
    border-radius:999px; font-family:inherit; font-weight:900; font-size:14px; padding:9px 20px;
    cursor:pointer; box-shadow:var(--shadow); transition:transform .08s;}
  .reroll:active{transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink);}

  .modes{position:relative; z-index:1; display:flex; gap:8px; justify-content:center; margin:20px 0 10px;}
  .modes button{font-family:inherit; font-weight:900; font-size:14px; padding:9px 22px;
    border:3px solid var(--ink); border-radius:999px; background:#fff; color:var(--ink);
    cursor:pointer; box-shadow:var(--shadow); transition:transform .08s;}
  .modes button.on{background:var(--ink); color:#fff;}
  .modes button:active{transform:translate(2px,2px);}

  .chips{position:relative; z-index:1; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:6px 0 18px;}
  .chip{font-family:inherit; font-weight:700; font-size:13px; padding:7px 13px; border-radius:999px;
    border:2.5px solid var(--ink); background:#fff; cursor:pointer; transition:transform .08s; display:flex; align-items:center; gap:5px;}
  .chip .n{font-size:11px; background:var(--ink); color:#fff; border-radius:999px; padding:0 6px; font-weight:900;}
  .chip.on{background:var(--lilac); color:#fff;}
  .chip.on .n{background:#fff; color:var(--ink);}
  .chip:active{transform:translateY(2px);}

  .grid{position:relative; z-index:1; display:grid; gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(158px,1fr));}
  .card{perspective:1000px; height:210px; cursor:pointer;}
  .inner{position:relative; width:100%; height:100%; transition:transform .5s cubic-bezier(.6,-0.2,.3,1.3); transform-style:preserve-3d;}
  .card.flip .inner{transform:rotateY(180deg);}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border:3px solid var(--line); border-radius:22px; background:var(--paper);
    box-shadow:5px 5px 0 var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:12px; text-align:center; overflow:hidden;}
  .face::before{content:""; position:absolute; top:-30%; left:-30%; width:80%; height:60%;
    background:radial-gradient(closest-side, rgba(255,255,255,.9), transparent); transform:rotate(20deg);}
  .front .cat-dot{position:absolute; top:9px; left:9px; width:14px; height:14px; border-radius:50%; border:2px solid var(--ink);}
  .front .pin{position:absolute; top:7px; right:10px; font-size:13px; opacity:.5;}
  .e{font-size:56px; line-height:1; display:inline-block; will-change:transform;}
  .k{font-size:24px; margin-top:6px;}
  .m{font-size:13px; font-weight:700; color:var(--pink); margin-top:3px; line-height:1.3;}
  .tapme{position:absolute; bottom:8px; font-size:10px; font-weight:700; opacity:.4;}
  .errbadge{position:absolute; top:7px; right:9px; font-size:11px; font-weight:900; line-height:1.5;
    background:var(--red); color:#fff; border:2px solid var(--ink); border-radius:999px; padding:0 6px; display:none; z-index:2;}
  .front.err .m, .front.err .k{color:inherit;}
  .front.err .tapme{opacity:.6;}
  .front.err .pin{display:none;}
  .front.err::before{opacity:.35;}
  .errlegend{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
    font-size:11.5px; font-weight:700; margin:0 0 16px;}
  .errlegend .sw{width:15px;height:15px;border:2px solid var(--ink);border-radius:5px;display:inline-block;vertical-align:middle;margin-right:2px;}
  .reset{font-family:inherit;font-weight:800;font-size:11px;padding:5px 11px;border:2px solid var(--ink);
    border-radius:999px;background:#fff;cursor:pointer;box-shadow:2px 2px 0 var(--ink);}
  .reset:active{transform:translate(2px,2px);box-shadow:none;}
  .qnote{text-align:center;font-size:12px;font-weight:700;opacity:.72;margin-top:14px;line-height:1.5;}
  .back{transform:rotateY(180deg); background:linear-gradient(160deg,#fff,#FFF4F9); justify-content:flex-start;}
  .back .bk{font-size:18px; margin:14px 0 2px;}
  .back .be{font-size:30px; margin-bottom:2px;}
  .back .bx{font-size:12.5px; font-weight:700; line-height:1.5; margin:6px 4px 0;}
  .back .bz{font-size:12px; opacity:.72; line-height:1.5; margin:7px 4px 0; border-top:2px dotted #E3C7D6; padding-top:7px;}
  .back .flag{position:absolute; bottom:7px; font-size:10px; opacity:.45;}

  .quiz{position:relative; z-index:1; max-width:460px; margin:0 auto; display:none;}
  .quiz.show{display:block;}
  .qcard{background:var(--paper); border:3px solid var(--line); border-radius:26px; box-shadow:7px 7px 0 var(--ink);
    padding:22px 18px; text-align:center;}
  .qscore{font-weight:900; font-size:13px; margin-bottom:6px;}
  .qscore .st{color:var(--pink);}
  .qtype{display:inline-block; background:var(--lilac); color:#fff; border:2px solid var(--ink);
    border-radius:999px; font-size:12px; font-weight:900; padding:3px 12px; margin:2px 0 14px;}
  .qbody{margin:4px 4px 16px; min-height:56px; display:flex; align-items:center; justify-content:center;}
  .qbody.word{font-size:32px;}
  .qbody.cloze{font-size:18.5px; line-height:1.8; flex-wrap:wrap;}
  .blank{display:inline-block; min-width:70px; margin:0 4px; padding:1px 10px; color:var(--pink);
    font-weight:900; border:2.5px dashed var(--pink); border-radius:10px; background:#FFF0F6;}
  .opts{display:grid; gap:9px;}
  .opt{font-family:inherit; font-weight:700; font-size:15px; padding:12px; border:3px solid var(--ink);
    border-radius:16px; background:#fff; cursor:pointer; transition:transform .08s; color:var(--ink);}
  .opt .oext{display:block; font-size:11.5px; font-weight:600; opacity:.72; margin-top:5px; line-height:1.45;}
  .opt .oext:empty{display:none;}
  .opt:active{transform:translateY(2px);}
  .opt.right{background:#C9F7D8; border-color:#1f8a4c;}
  .opt.wrong{background:#FFD6DB; border-color:var(--red);}
  .opt:disabled{cursor:default;}
  .qfb{min-height:24px; font-weight:900; font-size:16px; margin:12px 0 4px;}
  .qnext{background:var(--lilac); color:#fff; border:3px solid var(--ink); border-radius:999px;
    font-family:inherit; font-weight:900; font-size:15px; padding:10px 26px; cursor:pointer; box-shadow:var(--shadow);}
  .qnext:active{transform:translate(2px,2px);}

  footer{position:relative; z-index:1; text-align:center; margin-top:34px; font-size:12px; font-weight:700; opacity:.6;}

  @keyframes gulp{0%,100%{transform:scaleY(1)}30%{transform:scaleY(.78) translateY(3px)}60%{transform:scaleY(1.05)}}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}75%{transform:rotate(9deg)}}
  @keyframes squish{0%,100%{transform:scale(1,1)}30%{transform:scale(1.18,.78)}60%{transform:scale(.86,1.16)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-18px)}70%{transform:translateY(-6px)}}
  @keyframes march{0%{transform:translateX(-12px)}50%{transform:translateX(12px)}100%{transform:translateX(-12px)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes nod{0%,100%{transform:rotate(0) translateY(0)}50%{transform:rotate(14deg) translateY(5px)}}
  @keyframes droop{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(16deg) translateY(10px) scale(.96)}}
  @keyframes anger{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,-2px) rotate(-4deg)}40%{transform:translate(4px,2px) rotate(4deg)}60%{transform:translate(-4px,2px)}80%{transform:translate(4px,-2px)}}
  @keyframes shiver{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-3px)}}
  @keyframes pulse{0%,100%{transform:scale(1)}30%{transform:scale(1.28)}45%{transform:scale(1)}60%{transform:scale(1.18)}}
  @keyframes pop{0%{transform:scale(.5);opacity:.4}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
  @keyframes deflate{0%{transform:scale(1.18)}100%{transform:scale(.94)}}
  @keyframes drip{0%{transform:translateY(-4px)}60%{transform:translateY(6px) scaleY(1.1)}100%{transform:translateY(-4px)}}
  @keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  @keyframes heavy{0%{transform:translateY(-8px) scale(.98)}60%{transform:translateY(4px) scale(1.03,.97)}100%{transform:translateY(0) scale(1)}}
  @keyframes chop{0%{transform:rotate(-18deg) translateX(-6px)}50%{transform:rotate(8deg) translateX(4px) scale(1.1)}100%{transform:rotate(0)}}
  @keyframes grow{0%{transform:scaleY(.5) translateY(10px); transform-origin:bottom}100%{transform:scaleY(1) translateY(0); transform-origin:bottom}}
  @keyframes zoom{0%{transform:translateX(-22px) scale(.9);opacity:.4}50%{transform:translateX(8px) scale(1.05);opacity:1}100%{transform:translateX(0) scale(1)}}
  @keyframes sparkle{0%,100%{transform:scale(1) rotate(0);filter:brightness(1)}40%{transform:scale(1.25) rotate(12deg);filter:brightness(1.4)}70%{transform:scale(.95) rotate(-8deg)}}

  @media (prefers-reduced-motion: reduce){ .e,.fe,.sparkles span{animation:none !important;} }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sparkles" id="sparkles"></div>
<div class="wrap">
  <header>
    <h1 class="jp"><span class="horn">໒</span><span class="hl">オノマトペ</span>図鑑<span class="horn">໒</span></h1>
    <p class="sub">會動的單字卡 ・ 用畫面記住 66+ 個擬聲擬態詞</p>
  </header>

  <section class="feature" id="feature" aria-live="polite">
    <span class="tag">✦ 今日のあくま語 ✦</span>
    <div class="fe e" id="fe">💗</div>
    <div class="fk jp" id="fk">どきどき</div>
    <div class="fm" id="fm">心怦怦跳</div>
    <div class="fx jp" id="fx"></div>
    <button class="reroll" id="reroll">🎲 換一個</button>
  </section>

  <div class="modes">
    <button id="mGallery" class="on">📖 図鑑モード</button>
    <button id="mQuiz">👿 クイズ</button>
  </div>

  <div id="galleryView">
    <div class="statsbar">
      <span class="sv">📊&thinsp;<span id="sb_correct">0</span>/<span id="sb_total">0</span> 正解</span>
      <span class="sv">🔥 連続 <span id="sb_streak">0</span></span>
      <button class="sv" id="clearAll">🗑️ 全消去</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="errlegend" id="errlegend"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="quiz" id="quizView">
    <div class="qcard">
      <div class="qscore">連続正解 <span class="st" id="streak">0</span> ・ 正解 <span id="correct">0</span>/<span id="total">0</span></div>
      <div class="qtype jp" id="qtype">📖 意味えらび</div>
      <div class="qbody jp" id="qbody"></div>
      <div class="opts" id="opts"></div>
      <div class="qfb jp" id="qfb"></div>
      <button class="qnext" id="qnext" style="display:none">つぎへ →</button>
    </div>
    <p class="qnote jp">まちがえた語は「📖 図鑑」のカードに色がつくよ ・ ×が多いほど濃くなる🩸</p>
  </div>

  <footer>made with 💗 for 地呱 ・ tap でひっくり返す / 翻卡看例句 ・ v<span id="vnum">1.0.0</span></footer>
</div>

<script>
const APP_VERSION = "1.0.0";
const SK = "onoma";

const CAT = {
  1:{label:"飲食・口", icon:"🍙", color:"#FFB3C7"},
  2:{label:"動作・様子", icon:"🐧", color:"#7FD8F5"},
  3:{label:"感情・心理", icon:"💗", color:"#FF8FB8"},
  4:{label:"触感・状態", icon:"🍯", color:"#FFD84D"},
  5:{label:"痛覚・感覚", icon:"🌶️", color:"#FF5C5C"},
  6:{label:"光・音", icon:"✨", color:"#B589F6"},
  7:{label:"程度・様態", icon:"📐", color:"#9AE6B4"},
  8:{label:"時間・その他", icon:"⏰", color:"#C9B6F0"},
};
const ANIM={
  gulp:["gulp",".5s",3], tiny:["wiggle",".42s",3], squish:["squish",".6s",2], steam:["floaty","1.4s",2],
  fill:["bounce",".6s",2], march:["march","1s",2], shake:["shake",".5s",3], nod:["nod",".9s",2],
  float:["floaty","1.6s",2], droop:["droop","1s",1], bounce:["bounce",".55s",3], anger:["anger",".4s",4],
  shiver:["shiver",".4s",5], pulse:["pulse",".6s",3], pop:["pop",".55s",1], deflate:["deflate",".9s",1],
  drip:["drip","1.1s",2], sway:["sway","1s",2], heavy:["heavy","1s",1], chop:["chop",".5s",1],
  grow:["grow",".9s",1], zoom:["zoom",".7s",2], sparkle:["sparkle",".9s",2]
};
const DATA=[
 {k:"ごくごく",m:"咕嘟咕嘟（大口喝）",cat:1,emoji:"🥤",anim:"gulp",ex:"ビールをごくごく飲んだ。",exz:"咕嘟咕嘟把啤酒喝光了。"},
 {k:"ちびちび",m:"一點點、小口小口地",cat:1,emoji:"🍶",anim:"tiny",ex:"お酒をちびちび飲む。",exz:"一小口一小口地喝酒。"},
 {k:"もちもち",m:"糯糯的、Q彈",cat:1,emoji:"🍡",anim:"squish",ex:"このパンはもちもちしていておいしい。",exz:"這麵包Q彈又好吃。"},
 {k:"ほかほか",m:"熱乎乎",cat:1,emoji:"🍙",anim:"steam",ex:"ほかほかのご飯が炊きあがった。",exz:"熱乎乎的飯煮好了。"},
 {k:"たっぷり",m:"充足、足量",cat:1,emoji:"🪣",anim:"fill",ex:"時間はまだたっぷりある。",exz:"時間還很充裕。"},
 {k:"ぞろぞろ",m:"成群結隊、絡繹不絕",cat:2,emoji:"🐧",anim:"march",ex:"観客がぞろぞろと会場を出てきた。",exz:"觀眾成群結隊走出會場。"},
 {k:"こそこそ",m:"鬼鬼祟祟、偷偷摸摸",cat:2,emoji:"🐭",anim:"march",ex:"陰でこそこそ話すのはやめてほしい。",exz:"別在背後鬼鬼祟祟講話。"},
 {k:"じろじろ",m:"直勾勾打量、目不轉睛",cat:2,emoji:"👀",anim:"tiny",ex:"人の顔をじろじろ見るのは失礼だ。",exz:"直勾勾盯著別人的臉很失禮。"},
 {k:"うろうろ",m:"徘徊、晃來晃去",cat:2,emoji:"🚶",anim:"march",ex:"知らない街をうろうろ歩き回った。",exz:"在陌生的街上晃來晃去。"},
 {k:"もぞもぞ",m:"蠕動、慢吞吞地動",cat:2,emoji:"🐛",anim:"tiny",ex:"ポケットの中で何かがもぞもぞ動いている。",exz:"口袋裡有東西在蠕動。"},
 {k:"うとうと",m:"迷迷糊糊、打盹",cat:2,emoji:"😪",anim:"nod",ex:"電車の中でうとうとしてしまった。",exz:"在電車上不小心打起盹來。"},
 {k:"ぐっすり",m:"酣睡、睡得很熟",cat:2,emoji:"😴",anim:"float",ex:"昨夜はぐっすり眠れた。",exz:"昨晚睡得很熟。"},
 {k:"ぐったり",m:"筋疲力盡、軟綿綿",cat:2,emoji:"🫠",anim:"droop",ex:"暑さで犬がぐったりしている。",exz:"狗熱得軟趴趴的。"},
 {k:"のんびり",m:"悠閒自在",cat:2,emoji:"🦥",anim:"float",ex:"休日は家でのんびり過ごす。",exz:"假日在家悠閒度過。"},
 {k:"ぴちぴち",m:"活蹦亂跳",cat:2,emoji:"🐟",anim:"bounce",ex:"とれたての魚がぴちぴちはねる。",exz:"剛捕到的魚活蹦亂跳。"},
 {k:"バリバリ",m:"幹勁十足、賣力",cat:2,emoji:"💪",anim:"bounce",ex:"彼はバリバリ働く営業マンだ。",exz:"他是個幹勁十足的業務。"},
 {k:"イライラ",m:"焦急、煩躁",cat:3,emoji:"😤",anim:"anger",ex:"渋滞でイライラする。",exz:"塞車塞到很煩躁。"},

const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function perform(el, loop){
  if(reduce) return;
  const a = ANIM[el.dataset.anim]; if(!a) return;
  el.style.animation='none'; void el.offsetWidth;
  el.style.animation = `${a[0]} ${a[1]} ease-in-out ${loop?'infinite':a[2]}`;
}

function showToast(msg, dur=2200){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('up');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove('up'), dur);
}

function saveData(){
  try{
    localStorage.setItem(SK+'_wrong', JSON.stringify(wrongCounts));
    localStorage.setItem(SK+'_stats', JSON.stringify({streak,correct,total}));
    localStorage.setItem(SK+'_ver', APP_VERSION);
  }catch(e){}
}
function loadData(){
  try{
    const w=localStorage.getItem(SK+'_wrong');
    const s=localStorage.getItem(SK+'_stats');
    const v=localStorage.getItem(SK+'_ver');
    if(w){ const p=JSON.parse(w); Object.keys(p).forEach(k=>{ wrongCounts[k]=p[k]; }); }
    if(s){ const p=JSON.parse(s); streak=p.streak||0; correct=p.correct||0; total=p.total||0; }
    return v;
  }catch(e){ return null; }
}
function updateStatsBar(){
  document.getElementById('sb_correct').textContent=correct;
  document.getElementById('sb_total').textContent=total;
  document.getElementById('sb_streak').textContent=streak;
}

const wrongCounts = {};
const ERRC = [null,'hsl(338 100% 91%)','hsl(338 96% 83%)','hsl(338 90% 71%)','hsl(338 80% 56%)','hsl(338 74% 44%)'];
function errColor(n){ return ERRC[Math.min(n,5)]; }
function applyErr(card, n){
  const front=card.querySelector('.front'); const badge=card.querySelector('.errbadge');
  if(n<=0){ front.classList.remove('err'); front.style.background=''; front.style.color=''; badge.style.display='none'; return; }
  front.classList.add('err');
  front.style.background=errColor(n);
  front.style.color = n>=4 ? '#fff' : 'var(--ink)';
  badge.textContent='✗'+n; badge.style.display='inline-block';
}
function markWrong(key){
  wrongCounts[key]=(wrongCounts[key]||0)+1;
  const card=grid.querySelector('.card[data-key="'+key+'"]');
  if(card) applyErr(card, wrongCounts[key]);
  renderLegend(); saveData();
}
function renderLegend(){
  const el=document.getElementById('errlegend');
  const wrongN=Object.keys(wrongCounts).filter(k=>wrongCounts[k]>0).length;
  if(!wrongN){ el.innerHTML='<span style="opacity:.5">まだミスなし ・ クイズでまちがえるとここに記録されるよ ✦</span>'; return; }
  el.innerHTML='まちがえた語 <b>'+wrongN+'</b> ・ '+
    [1,2,3,4,5].map(i=>'<span class="sw" style="background:'+errColor(i)+'"></span>×'+i+(i===5?'+':'')).join(' ')+
    ' <button class="reset" id="resetBtn">🧹 誤字リセット</button>';
  document.getElementById('resetBtn').onclick=()=>{
    Object.keys(wrongCounts).forEach(k=>delete wrongCounts[k]);
    renderGrid(); renderLegend(); saveData();
    showToast('🧹 誤字記録をリセットしました');
  };
}

(function(){
  const s=document.getElementById('sparkles'); const marks=['✦','✧','⭐','♡','✨'];
  for(let i=0;i<16;i++){const e=document.createElement('span');
    e.textContent=marks[i%marks.length];
    e.style.left=Math.random()*100+'%'; e.style.top=Math.random()*100+'%';
    e.style.animationDelay=(Math.random()*3)+'s';
    e.style.color=['#FF8FB8','#B589F6','#7FD8F5','#FFD84D'][i%4];
    s.appendChild(e);}
})();

let activeCat = 0;
const grid=document.getElementById('grid');
const chipBox=document.getElementById('chips');

function buildChips(){
  const counts={}; DATA.forEach(d=>counts[d.cat]=(counts[d.cat]||0)+1);
  const mk=(id,icon,label,n)=>{
    const b=document.createElement('button'); b.className='chip'+(id===activeCat?' on':'');
    b.innerHTML=`${icon} ${label} <span class="n">${n}</span>`;
    b.onclick=()=>{activeCat=id; renderGrid(); [...chipBox.children].forEach(c=>c.classList.remove('on')); b.classList.add('on');};
    return b;
  };
  chipBox.appendChild(mk(0,'✦','全部',DATA.length));
  Object.keys(CAT).forEach(k=>chipBox.appendChild(mk(+k,CAT[k].icon,CAT[k].label,counts[k]||0)));
}

function renderGrid(){
  grid.innerHTML='';
  const list = activeCat? DATA.filter(d=>d.cat===activeCat) : DATA;
  list.forEach(d=>{
    const card=document.createElement('div'); card.className='card'; card.dataset.key=d.k;
    card.innerHTML=`
      <div class="inner">
        <div class="face front">
          <span class="cat-dot" style="background:${CAT[d.cat].color}"></span>
          <span class="pin">${CAT[d.cat].icon}</span>
          <span class="errbadge"></span>
          <span class="e" data-anim="${d.anim}">${d.emoji}</span>
          <div class="k jp">${d.k}</div>
          <div class="m">${d.m}</div>
          <div class="tapme">tap で例文 ↻</div>
        </div>
        <div class="face back">
          <div class="be">${d.emoji}</div>
          <div class="bk jp">${d.k}</div>
          <div class="bx jp">${d.ex}</div>
          <div class="bz">${d.exz}</div>
          <div class="flag">↻ tap でもどる</div>
        </div>
      </div>`;
    const emo=card.querySelector('.front .e');
    card.addEventListener('click',()=>{
      card.classList.toggle('flip');
      if(!card.classList.contains('flip')) perform(emo,false);
    });
    if(!('ontouchstart' in window)){
      card.addEventListener('mouseenter',()=>{ if(!card.classList.contains('flip')) perform(emo,false); });
    }
    applyErr(card, wrongCounts[d.k]||0);
    grid.appendChild(card);
    io.observe(emo);
  });
}

const io=new IntersectionObserver((ents)=>{
  ents.forEach(e=>{ if(e.isIntersecting){ perform(e.target,false); io.unobserve(e.target);} });
},{threshold:.4});

const fe=document.getElementById('fe'),fk=document.getElementById('fk'),fm=document.getElementById('fm'),fx=document.getElementById('fx');
function feature(){
  const d=DATA[Math.floor(Math.random()*DATA.length)];
  fe.textContent=d.emoji; fe.dataset.anim=d.anim; fk.textContent=d.k; fm.textContent=d.m; fx.textContent=d.ex;
  perform(fe,true);
}
document.getElementById('reroll').onclick=feature;

let qCur=null, qMode='B', qChoices=[], streak=0, correct=0, total=0;
const opts=document.getElementById('opts'), qfb=document.getElementById('qfb'),
      qnext=document.getElementById('qnext'), qtype=document.getElementById('qtype'),
      qbody=document.getElementById('qbody');
const BLANKFORM={ "ほっとする":"ほっとした", "びっくりする":"びっくりした", "ぞっとする":"ぞっとした" };
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}
function isCorrect(c){ return qMode==='A' ? c.k===qCur.k : c.m===qCur.m; }

function makeOpt(label, c){
  const b=document.createElement('button'); b.className='opt'+(qMode==='A'?' jp':'');
  b.innerHTML='<span class="olab"></span><span class="oext"></span>';
  b.querySelector('.olab').textContent=label;
  b.onclick=()=>answer(b,c);
  return b;
}
function newQ(){
  qfb.textContent=''; qfb.style.color=''; qnext.style.display='none'; opts.innerHTML='';
  qCur=DATA[Math.floor(Math.random()*DATA.length)];
  qMode = Math.random()<0.5 ? 'A' : 'B';
  if(qMode==='B'){
    qtype.textContent='📖 意味えらび';
    qbody.className='qbody jp word'; qbody.textContent=qCur.k;
    qChoices=shuffle([qCur, ...shuffle(DATA.filter(d=>d.m!==qCur.m)).slice(0,3)]);
    qChoices.forEach(c=>opts.appendChild(makeOpt(c.m, c)));
  }else{
    qtype.textContent='📝 例文穴埋め';
    const surf = BLANKFORM[qCur.k] || qCur.k;
    qbody.className='qbody jp cloze';
    qbody.innerHTML = qCur.ex.replace(surf, '<span class="blank">？</span>');
    qChoices=shuffle([qCur, ...shuffle(DATA.filter(d=>d.k!==qCur.k)).slice(0,3)]);
    qChoices.forEach(c=>opts.appendChild(makeOpt(c.k, c)));
  }
}
function answer(btn, choice){
  total++; document.getElementById('total').textContent=total;
  const right=isCorrect(choice);
  [...opts.children].forEach((b,i)=>{
    b.disabled=true;
    const c=qChoices[i];
    if(isCorrect(c)) b.classList.add('right');
    b.querySelector('.oext').textContent = qMode==='A' ? c.m : (c.k+'：'+c.ex);
  });
  if(right){
    correct++; streak++; qfb.textContent='◎ 正解！えらい😈'; qfb.style.color='#1f8a4c';
  }else{
    btn.classList.add('wrong'); streak=0;
    qfb.textContent = qMode==='A' ? ('✗ 正解は「'+qCur.k+'」') : ('✗ 正解は「'+qCur.m+'」');
    qfb.style.color='#FF5C5C';
    markWrong(qCur.k);
  }
  document.getElementById('correct').textContent=correct;
  document.getElementById('streak').textContent=streak;
  saveData(); updateStatsBar();
  qnext.style.display='inline-block';
}
qnext.onclick=newQ;

const gV=document.getElementById('galleryView'),qV=document.getElementById('quizView'),
      mG=document.getElementById('mGallery'),mQ=document.getElementById('mQuiz');
mG.onclick=()=>{
  mG.classList.add('on'); mQ.classList.remove('on');
  gV.style.display=''; qV.classList.remove('show');
  renderGrid(); renderLegend(); updateStatsBar();
};
mQ.onclick=()=>{
  mQ.classList.add('on'); mG.classList.remove('on');
  gV.style.display='none'; qV.classList.add('show');
  document.getElementById('correct').textContent=correct;
  document.getElementById('total').textContent=total;
  document.getElementById('streak').textContent=streak;
  if(!qCur) newQ();
};

document.getElementById('clearAll').onclick=()=>{
  if(!confirm('全ての記録（誤字・クイズ成績）を消去しますか？')) return;
  Object.keys(wrongCounts).forEach(k=>delete wrongCounts[k]);
  streak=0; correct=0; total=0;
  saveData(); updateStatsBar(); renderGrid(); renderLegend();
  showToast('🗑️ 全ての記録を消去しました');
};

document.getElementById('vnum').textContent=APP_VERSION;
const storedVer=loadData();
buildChips(); renderGrid(); renderLegend(); feature();
updateStatsBar();
document.getElementById('correct').textContent=correct;
document.getElementById('total').textContent=total;
document.getElementById('streak').textContent=streak;
if(storedVer && storedVer!==APP_VERSION){
  setTimeout(()=>showToast('✨ アプリが更新されました！v'+APP_VERSION+' ・ 記録はそのまま引き継がれます',4000),600);
}else if(!storedVer && total===0){
  setTimeout(()=>showToast('💾 クイズ記録は自動保存されます',2500),1000);
}
