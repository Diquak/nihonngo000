<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N2 擬態語・語彙帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#FF4D8D; --pink2:#FF8FB8; --lilac:#B589F6; --sky:#7FD8F5;
    --yellow:#FFD84D; --red:#FF5C5C; --ink:#3A2E4D; --paper:#FFFFFF;
    --bg1:#FFF0F6; --bg2:#F1E7FF; --line:#3A2E4D;
    --shadow:4px 4px 0 var(--ink);
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; color:var(--ink);
    font-family:"Zen Maru Gothic","PingFang TC","Microsoft JhengHei",sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(127,216,245,.35), transparent 60%),
      radial-gradient(1000px 500px at 0% 110%, rgba(255,77,141,.18), transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100vh; overflow-x:hidden;
  }
  .jp{font-family:"Mochiy Pop One","Zen Maru Gothic",sans-serif;}
  .wrap{max-width:1080px; margin:0 auto; padding:18px 16px 80px;}

  .sparkles{position:fixed; inset:0; pointer-events:none; z-index:0;}
  .sparkles span{position:absolute; font-size:18px; opacity:.7; animation:tw 3s ease-in-out infinite;}
  @keyframes tw{0%,100%{transform:scale(.6) rotate(0);opacity:.25}50%{transform:scale(1.1) rotate(20deg);opacity:.9}}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--ink);color:#fff;padding:11px 22px;border-radius:999px;
    font-family:inherit;font-weight:700;font-size:13px;z-index:200;
    transition:transform .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;
    box-shadow:4px 4px 0 rgba(0,0,0,.25);}
  .toast.up{transform:translateX(-50%) translateY(0);}

  header{position:relative; z-index:1; text-align:center; padding:14px 6px 6px;}
  h1{font-size:clamp(19px,4.6vw,34px); margin:6px 0 4px; line-height:1.1; color:var(--ink);}
  h1 .hl{color:var(--pink); text-shadow:2px 2px 0 #fff, 4px 4px 0 var(--lilac);}
  .sub{font-size:13px; font-weight:700; opacity:.8;}

  .feature{position:relative; z-index:1; margin:16px auto 8px; max-width:520px;
    background:var(--paper); border:3px solid var(--line); border-radius:26px;
    box-shadow:7px 7px 0 var(--ink); padding:16px 18px 14px; text-align:center;}
  .feature .tag{display:inline-block; background:var(--yellow); border:2px solid var(--ink);
    border-radius:999px; font-weight:900; font-size:12px; padding:3px 12px; transform:rotate(-1.5deg); margin-bottom:6px;}
  .feature .fe{font-size:64px; line-height:1; display:inline-block; margin:2px 0;}
  .feature .fk{font-size:30px; margin:2px 0;}
  .feature .fr{font-size:14px; font-weight:700; opacity:.6;}
  .feature .fm{font-size:15px; font-weight:700; color:var(--pink); margin-top:2px;}
  .feature .fx{font-size:13px; opacity:.78; margin-top:8px; line-height:1.55;}
  .feature .fz{font-size:12px; opacity:.6; margin-top:3px; line-height:1.5;}
  .reroll{margin-top:12px; background:var(--pink); color:#fff; border:3px solid var(--ink);
    border-radius:999px; font-family:inherit; font-weight:900; font-size:14px; padding:9px 20px;
    cursor:pointer; box-shadow:var(--shadow); transition:transform .08s;}
  .reroll:active{transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink);}

  .modes{position:relative; z-index:1; display:flex; gap:8px; justify-content:center; margin:20px 0 10px; flex-wrap:wrap;}
  .modes button{font-family:inherit; font-weight:900; font-size:14px; padding:9px 20px;
    border:3px solid var(--ink); border-radius:999px; background:#fff; color:var(--ink);
    cursor:pointer; box-shadow:var(--shadow); transition:transform .08s;}
  .modes button.on{background:var(--ink); color:#fff;}
  .modes button:active{transform:translate(2px,2px);}

  .statsbar{position:relative;z-index:1;display:flex;align-items:center;flex-wrap:wrap;gap:8px;
    justify-content:center;margin:0 0 10px;font-size:12.5px;font-weight:700;}
  .statsbar .sv{display:flex;align-items:center;gap:4px;background:#fff;border:2.5px solid var(--ink);
    border-radius:999px;padding:5px 13px;box-shadow:2px 2px 0 var(--ink);
    font-family:inherit;font-size:12.5px;font-weight:700;cursor:default;}
  #clearAll{cursor:pointer;transition:transform .08s;}
  #clearAll:active{transform:translate(1px,1px);box-shadow:none;}

  .chips{position:relative; z-index:1; display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin:6px 0 14px;}
  .chip{font-family:inherit; font-weight:700; font-size:12.5px; padding:6px 12px; border-radius:999px;
    border:2.5px solid var(--ink); background:#fff; cursor:pointer; transition:transform .08s; display:flex; align-items:center; gap:5px;}
  .chip .n{font-size:10.5px; background:var(--ink); color:#fff; border-radius:999px; padding:0 6px; font-weight:900;}
  .chip.on{background:var(--lilac); color:#fff;}
  .chip.on .n{background:#fff; color:var(--ink);}
  .chip[data-cat="__wrong__"].on{background:#FFD6DB; color:var(--ink);}
  .chip[data-cat="__wrong__"].on .n{background:var(--red); color:#fff;}
  .chip:active{transform:translateY(2px);}

  .errlegend{display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
    font-size:11.5px; font-weight:700; margin:0 0 16px; position:relative; z-index:1;}
  .errlegend .sw{width:15px;height:15px;border:2px solid var(--ink);border-radius:5px;display:inline-block;vertical-align:middle;margin-right:2px;}
  .reset{font-family:inherit;font-weight:800;font-size:11px;padding:5px 11px;border:2px solid var(--ink);
    border-radius:999px;background:#fff;cursor:pointer;box-shadow:2px 2px 0 var(--ink);}
  .reset:active{transform:translate(2px,2px);box-shadow:none;}

  .cat-hdr{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:9px 14px;
    font-weight:900;font-size:14px;border:2.5px solid var(--ink);border-radius:14px;
    box-shadow:3px 3px 0 var(--ink);position:relative;z-index:1;}
  .cat-hdr .chc{font-size:22px;}
  .cat-hdr .chn{font-size:11px;margin-left:auto;background:var(--ink);color:#fff;
    border-radius:999px;padding:2px 9px;font-weight:900;}
  .filter-clear{font-family:inherit;font-size:11px;font-weight:900;padding:3px 10px;
    border:2px solid var(--ink);border-radius:999px;background:#fff;cursor:pointer;
    box-shadow:2px 2px 0 var(--ink);margin-left:6px;}
  .filter-clear:active{transform:translate(1px,1px);box-shadow:none;}
  .grid{position:relative; z-index:1; display:grid; gap:13px;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .card{perspective:1000px; height:200px; cursor:pointer;}
  .inner{position:relative; width:100%; height:100%; transition:transform .5s cubic-bezier(.6,-0.2,.3,1.3); transform-style:preserve-3d;}
  .card.flip .inner{transform:rotateY(180deg);}
  .face{position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border:3px solid var(--line); border-radius:20px; background:var(--paper);
    box-shadow:5px 5px 0 var(--ink); display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:11px; text-align:center; overflow:hidden;}
  .front .cat-dot{position:absolute; top:9px; left:9px; width:13px; height:13px; border-radius:50%; border:2px solid var(--ink);}
  .front .pin{position:absolute; top:6px; right:9px; font-size:12px; opacity:.5;}
  .e{font-size:50px; line-height:1; display:inline-block; will-change:transform;}
  .e.txt{font-size:30px;}
  .k{font-size:21px; margin-top:6px;}
  .kr{font-size:11px; opacity:.55; margin-top:2px;}
  .m{font-size:12.5px; font-weight:700; color:var(--pink); margin-top:3px; line-height:1.3;}
  .tapme{position:absolute; bottom:7px; font-size:9.5px; font-weight:700; opacity:.4;}
  .errbadge{position:absolute; top:6px; right:8px; font-size:10.5px; font-weight:900; line-height:1.5;
    background:var(--red); color:#fff; border:2px solid var(--ink); border-radius:999px; padding:0 6px; display:none; z-index:2;}
  .front.err .m, .front.err .k{color:inherit;}
  .front.err .tapme{opacity:.6;}
  .front.err .pin{display:none;}
  .back{transform:rotateY(180deg); background:linear-gradient(160deg,#fff,#FFF4F9); justify-content:flex-start;}
  .back .bk{font-size:16px; margin:12px 0 1px;}
  .back .bp{font-size:10.5px; opacity:.5; margin-bottom:2px;}
  .back .be{font-size:26px; margin-bottom:2px;}
  .back .bx{font-size:12px; font-weight:700; line-height:1.5; margin:5px 4px 0;}
  .back .bz{font-size:11.5px; opacity:.72; line-height:1.5; margin:6px 4px 0; border-top:2px dotted #E3C7D6; padding-top:6px;}
  .back .bsyn{font-size:11px; opacity:.7; margin-top:6px; font-weight:700;}
  .back .flag{position:absolute; bottom:6px; font-size:9.5px; opacity:.45;}

  .quiz{position:relative; z-index:1; max-width:460px; margin:0 auto; display:none;}
  .quiz.show{display:block;}
  .qprog{height:10px; background:#fff; border:2.5px solid var(--ink); border-radius:999px; overflow:hidden; margin-bottom:12px;}
  .qprog i{display:block; height:100%; background:linear-gradient(90deg,var(--pink),var(--lilac)); width:0; transition:width .3s;}
  .qcard{background:var(--paper); border:3px solid var(--line); border-radius:26px; box-shadow:7px 7px 0 var(--ink);
    padding:20px 18px; text-align:center;}
  .qscore{font-weight:900; font-size:12.5px; margin-bottom:6px;}
  .qscore .st{color:var(--pink);}
  .qtype{display:inline-block; background:var(--lilac); color:#fff; border:2px solid var(--ink);
    border-radius:999px; font-size:11.5px; font-weight:900; padding:3px 12px; margin:2px 0 12px;}
  .qcat{display:inline-block; font-size:10.5px; font-weight:700; opacity:.55; margin-left:4px;}
  .qbody{margin:4px 4px 16px; min-height:48px; display:flex; align-items:center; justify-content:center; flex-wrap:wrap;}
  .qbody.word{font-size:30px;}
  .qbody.cloze{font-size:17px; line-height:1.8;}
  .qbody .qq{font-size:14px; opacity:.6; display:block; width:100%; margin-top:6px;}
  .blank{display:inline-block; min-width:60px; margin:0 4px; padding:1px 10px; color:var(--pink);
    font-weight:900; border:2.5px dashed var(--pink); border-radius:10px; background:#FFF0F6;}
  .opts{display:grid; gap:9px;}
  .opt{font-family:inherit; font-weight:700; font-size:15px; padding:11px; border:3px solid var(--ink);
    border-radius:16px; background:#fff; cursor:pointer; transition:transform .08s; color:var(--ink);}
  .opt .oext{display:block; font-size:11px; font-weight:600; opacity:.72; margin-top:5px; line-height:1.45;}
  .opt .oext:empty{display:none;}
  .opt:active{transform:translateY(2px);}
  .opt.right{background:#C9F7D8; border-color:#1f8a4c;}
  .opt.wrong{background:#FFD6DB; border-color:var(--red);}
  .opt:disabled{cursor:default;}
  .qfb{min-height:22px; font-weight:900; font-size:15px; margin:12px 0 4px;}
  .qnext{background:var(--lilac); color:#fff; border:3px solid var(--ink); border-radius:999px;
    font-family:inherit; font-weight:900; font-size:15px; padding:10px 26px; cursor:pointer; box-shadow:var(--shadow);}
  .qnext:active{transform:translate(2px,2px);}
  .qend{text-align:center;}
  .qend .big{font-size:46px; margin:6px 0;}
  .qend .sc{font-size:22px; font-weight:900; color:var(--pink); margin:4px 0;}
  .qend .ms{font-size:13px; font-weight:700; opacity:.75; margin:8px 0 16px; line-height:1.6;}

  .setbox{position:relative; z-index:1; max-width:540px; margin:0 auto;}
  .setcard{background:var(--paper); border:3px solid var(--line); border-radius:22px; box-shadow:6px 6px 0 var(--ink);
    padding:16px 16px; margin-bottom:14px;}
  .setcard h3{margin:0 0 10px; font-size:14px;}
  .togs{display:flex; flex-wrap:wrap; gap:8px;}
  .tog{font-family:inherit; font-weight:700; font-size:12.5px; padding:7px 13px; border-radius:14px;
    border:2.5px solid var(--ink); background:#fff; cursor:pointer; transition:transform .08s;}
  .tog.on{background:var(--pink); color:#fff;}
  .tog:active{transform:translateY(2px);}
  .startq{display:block; width:100%; background:var(--ink); color:#fff; border:3px solid var(--ink);
    border-radius:999px; font-family:inherit; font-weight:900; font-size:16px; padding:13px; cursor:pointer;
    box-shadow:var(--shadow); margin-top:4px;}
  .startq:active{transform:translate(2px,2px);}
  .hint{font-size:11.5px; opacity:.6; font-weight:700; margin-top:8px; line-height:1.5;}

  .qnote{text-align:center;font-size:12px;font-weight:700;opacity:.72;margin-top:14px;line-height:1.5; position:relative; z-index:1;}
  footer{position:relative; z-index:1; text-align:center; margin-top:34px; font-size:12px; font-weight:700; opacity:.6;}

  @keyframes gulp{0%,100%{transform:scaleY(1)}30%{transform:scaleY(.78) translateY(3px)}60%{transform:scaleY(1.05)}}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-9deg)}75%{transform:rotate(9deg)}}
  @keyframes squish{0%,100%{transform:scale(1,1)}30%{transform:scale(1.18,.78)}60%{transform:scale(.86,1.16)}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-18px)}70%{transform:translateY(-6px)}}
  @keyframes march{0%{transform:translateX(-12px)}50%{transform:translateX(12px)}100%{transform:translateX(-12px)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
  @keyframes nod{0%,100%{transform:rotate(0) translateY(0)}50%{transform:rotate(14deg) translateY(5px)}}
  @keyframes droop{0%{transform:rotate(0) translateY(0)}100%{transform:rotate(16deg) translateY(10px) scale(.96)}}
  @keyframes anger{0%,100%{transform:translate(0,0)}20%{transform:translate(-4px,-2px) rotate(-4deg)}40%{transform:translate(4px,2px) rotate(4deg)}60%{transform:translate(-4px,2px)}80%{transform:translate(4px,-2px)}}
  @keyframes shiver{0%,100%{transform:translateX(0)}25%{transform:translateX(-3px)}50%{transform:translateX(3px)}75%{transform:translateX(-3px)}}
  @keyframes pulse{0%,100%{transform:scale(1)}30%{transform:scale(1.28)}45%{transform:scale(1)}60%{transform:scale(1.18)}}
  @keyframes pop{0%{transform:scale(.5);opacity:.4}60%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
  @keyframes deflate{0%{transform:scale(1.18)}100%{transform:scale(.94)}}
  @keyframes drip{0%{transform:translateY(-4px)}60%{transform:translateY(6px) scaleY(1.1)}100%{transform:translateY(-4px)}}
  @keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  @keyframes heavy{0%{transform:translateY(-8px) scale(.98)}60%{transform:translateY(4px) scale(1.03,.97)}100%{transform:translateY(0) scale(1)}}
  @keyframes chop{0%{transform:rotate(-18deg) translateX(-6px)}50%{transform:rotate(8deg) translateX(4px) scale(1.1)}100%{transform:rotate(0)}}
  @keyframes grow{0%{transform:scaleY(.5) translateY(10px); transform-origin:bottom}100%{transform:scaleY(1) translateY(0); transform-origin:bottom}}
  @keyframes zoom{0%{transform:translateX(-22px) scale(.9);opacity:.4}50%{transform:translateX(8px) scale(1.05);opacity:1}100%{transform:translateX(0) scale(1)}}
  @keyframes sparkle{0%,100%{transform:scale(1) rotate(0);filter:brightness(1)}40%{transform:scale(1.25) rotate(12deg);filter:brightness(1.4)}70%{transform:scale(.95) rotate(-8deg)}}
  @media (prefers-reduced-motion: reduce){ .e,.fe,.sparkles span{animation:none !important;} }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="sparkles" id="sparkles"></div>
<div class="wrap">
  <header>
    <h1 class="jp">2020-2025 <span class="hl">N2</span> 擬態語・語彙帳</h1>
  </header>

  <section class="feature" id="feature" aria-live="polite">
    <span class="tag">隨手背一個吧！</span>
    <div class="fe e" id="fe">💗</div>
    <div class="fk jp" id="fk">どきどき</div>
    <div class="fr" id="fr"></div>
    <div class="fm" id="fm">心怦怦跳</div>
    <div class="fx jp" id="fx"></div>
    <div class="fz" id="fz"></div>
    <button class="reroll" id="reroll">🎲 換一個</button>
  </section>

  <div class="modes">
    <button id="mGallery" class="on">📖 図鑑</button>
    <button id="mQuiz">👿 クイズ</button>
    <button id="mSet">⚙️ 設定</button>
  </div>

  <div id="galleryView">
    <div class="statsbar">
      <span class="sv">📊&thinsp;<span id="sb_correct">0</span>/<span id="sb_total">0</span> 正解</span>
      <span class="sv">🔥 連続 <span id="sb_streak">0</span></span>
      <button class="sv" id="clearAll">🗑️ 全消去</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="errlegend" id="errlegend"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="quiz" id="quizView">
    <div class="qprog"><i id="qprogbar"></i></div>
    <div class="qcard" id="qcard">
      <div class="qscore">問題 <span id="qidx">1</span>/<span id="qlen">0</span> ・ 連続 <span class="st" id="streak">0</span> ・ 正解 <span id="correct">0</span>/<span id="total">0</span></div>
      <div class="qtype jp"><span id="qtype">意味えらび</span><span class="qcat" id="qcat"></span></div>
      <div class="qbody jp" id="qbody"></div>
      <div class="opts" id="opts"></div>
      <div class="qfb jp" id="qfb"></div>
      <button class="qnext" id="qnext" style="display:none">つぎへ →</button>
    </div>
    <p class="qnote jp">まちがえた語は「📖 図鑑」のカードに色がつくよ ・ ×が多いほど濃くなる🩸</p>
  </div>

  <div class="setbox" id="setView" style="display:none">
    <div class="setcard">
      <h3>📝 出題タイプ</h3>
      <div class="togs" id="typeTogs"></div>
    </div>
    <div class="setcard">
      <h3>🏷️ 範囲（カテゴリ）<span style="font-size:11px;font-weight:700;opacity:.5">／ 空 = 全部</span></h3>
      <div class="togs" id="catTogs"></div>
    </div>
    <div class="setcard">
      <h3>🔢 問題数</h3>
      <div class="togs" id="countTogs"></div>
    </div>
    <div class="setcard">
      <h3>🩸 まちがえた語だけ</h3>
      <div class="togs" id="wrongTogs"></div>
    </div>
    <button class="startq jp" id="startQuiz">👿 クイズをはじめる</button>
    <p class="hint" id="setHint"></p>
  </div>

  <footer>by diquak ・ tap でひっくり返す / 翻卡看例句 ・ v<span id="vnum"></span></footer>
</div>

<script>
const ALL_DATA=[
{id:0,w:"ごくごく",r:"ごくごく",p:"擬態語",m:"咕嘟咕嘟（大口喝）",ej:"ビールをごくごく飲んだ。",ez:"咕嘟咕嘟把啤酒喝光了。",syn:"",cat:"飲食・口",hk:false,isO:true,ocat:1,emoji:"🥤",anim:"gulp"},
{id:1,w:"ちびちび",r:"ちびちび",p:"擬態語",m:"一點點、小口小口地",ej:"お酒をちびちび飲む。",ez:"一小口一小口地喝酒。",syn:"",cat:"飲食・口",hk:false,isO:true,ocat:1,emoji:"🍶",anim:"tiny"},
{id:2,w:"もちもち",r:"もちもち",p:"擬態語",m:"糯糯的、Q彈",ej:"このパンはもちもちしていておいしい。",ez:"這麵包Q彈又好吃。",syn:"",cat:"飲食・口",hk:false,isO:true,ocat:1,emoji:"🍡",anim:"squish"},
{id:3,w:"ほかほか",r:"ほかほか",p:"擬態語",m:"熱乎乎",ej:"ほかほかのご飯が炊きあがった。",ez:"熱乎乎的飯煮好了。",syn:"",cat:"飲食・口",hk:false,isO:true,ocat:1,emoji:"🍙",anim:"steam"},
{id:4,w:"たっぷり",r:"たっぷり",p:"擬態語",m:"充足、足量",ej:"時間はまだたっぷりある。",ez:"時間還很充裕。",syn:"",cat:"飲食・口",hk:false,isO:true,ocat:1,emoji:"🪣",anim:"fill"},
{id:5,w:"ぞろぞろ",r:"ぞろぞろ",p:"擬態語",m:"成群結隊、絡繹不絕",ej:"観客がぞろぞろと会場を出てきた。",ez:"觀眾成群結隊走出會場。",syn:"",cat:"動作・様子",hk:false,isO:true,ocat:2,emoji:"🐧",anim:"march"},

const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function shuffle(a){return a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);}
function perform(el, loop){
  if(reduce||!el) return;
  const a = ANIM[el.dataset.anim]; if(!a) return;
  el.style.animation='none'; void el.offsetWidth;
  el.style.animation = `${a[0]} ${a[1]} ease-in-out ${loop?'infinite':a[2]}`;
}
function showToast(msg, dur=2200){

  t.textContent=msg; t.classList.add('up');
  clearTimeout(t._tid); t._tid=setTimeout(()=>t.classList.remove('up'), dur);
}

function save(){
  try{
    localStorage.setItem(SK+'_wrong', JSON.stringify(wrongCounts));
    localStorage.setItem(SK+'_stats', JSON.stringify({streak,correct,total}));
    localStorage.setItem(SK+'_set', JSON.stringify(settings));
    localStorage.setItem(SK+'_ver', APP_VERSION);
  }catch(e){}
}
function load(){
  try{
    const w=localStorage.getItem(SK+'_wrong'); if(w) wrongCounts=JSON.parse(w)||{};
    const s=localStorage.getItem(SK+'_stats'); if(s){const p=JSON.parse(s); streak=p.streak||0; correct=p.correct||0; total=p.total||0;}
    const st=localStorage.getItem(SK+'_set'); if(st){ settings=Object.assign(settings, JSON.parse(st)||{}); }
  }catch(e){}
}

function applyErr(card, n){
  const front=card.querySelector('.front'); const badge=card.querySelector('.errbadge');
  if(n<=0){ front.classList.remove('err'); front.style.background=''; front.style.color=''; badge.style.display='none'; return; }

  front.style.background=errColor(n);

  badge.textContent='✗'+n; badge.style.display='inline-block';

// ---------- quiz core ----------
function findSurface(d){
  if(!d.ej) return null;
  const tries = d.w===d.r ? [d.w] : [d.w, d.r];
  for(const base of tries){
    if(!base) continue;
    if(d.ej.includes(base)) return base;
    if(base.endsWith('する')){
      const s=base.slice(0,-2);
      for(const f of ['した','して','しない','せず','します','している','しており','しよう','しろ']) if(d.ej.includes(s+f)) return s+f;
      if(d.ej.includes(s)) return s;
    }
    if(base.endsWith('い')){
      const s=base.slice(0,-1);
      for(const f of ['く','くて','かった','くない','ければ','くなる','さ']) if(d.ej.includes(s+f)) return s+f;
    }
    if(base.endsWith('る')){
      const s=base.slice(0,-1);
      for(const f of ['た','て','ている','ない','られ','れ','よう','ろ','ます']) if(d.ej.includes(s+f)) return s+f;
    }
    const g={う:['って','った','わ','い','います'],く:['いて','いた','か','き'],ぐ:['いで','いだ','が','ぎ'],
             す:['して','した','さ','し'],つ:['って','った','た','ち'],ぬ:['んで','んだ','な','に'],
             ぶ:['んで','んだ','ば','び'],む:['んで','んだ','ま','み'],る:['って','った','ら','り']};
    const last=base.slice(-1);
    if(g[last]){
      const s=base.slice(0,-1);
      for(const f of g[last]) if(d.ej.includes(s+f)) return s+f;
    }
  }
  return null;
}
const GETVAL = { meaning:d=>d.m, cloze:d=>d.w, synonym:d=>d.syn, reading:d=>d.r, kanji:d=>d.w };

// ---- 漢字読み: 似た読み方の選択肢を生成（JLPT風のひっかけ） ----
const GYOU=[
  ['あ','い','う','え','お'],['か','き','く','け','こ'],['が','ぎ','ぐ','げ','ご'],
  ['さ','し','す','せ','そ'],['ざ','じ','ず','ぜ','ぞ'],['た','ち','つ','て','と'],
  ['だ','ぢ','づ','で','ど'],['な','に','ぬ','ね','の'],['は','ひ','ふ','へ','ほ'],
  ['ば','び','ぶ','べ','ぼ'],['ぱ','ぴ','ぷ','ぺ','ぽ'],['ま','み','む','め','も'],
  ['や','','ゆ','','よ'],['ら','り','る','れ','ろ'],['わ','','','','を']
];
const VOICE={'か':'が','き':'ぎ','く':'ぐ','け':'げ','こ':'ご','さ':'ざ','し':'じ','す':'ず','せ':'ぜ','そ':'ぞ',
  'た':'だ','ち':'ぢ','つ':'づ','て':'で','と':'ど','は':'ば','ひ':'び','ふ':'ぶ','へ':'べ','ほ':'ぼ'};
const HANDA={'は':'ぱ','ひ':'ぴ','ふ':'ぷ','へ':'ぺ','ほ':'ぽ'};
const UNVOICE={}; for(const k in VOICE) UNVOICE[VOICE[k]]=k;
const UNHANDA={}; for(const k in HANDA) UNHANDA[HANDA[k]]=k;
const KVOWEL={}; const VW=['a','i','u','e','o'];
GYOU.forEach(row=>row.forEach((k,i)=>{ if(k) KVOWEL[k]=VW[i]; }));
Object.assign(KVOWEL,{'ゃ':'a','ゅ':'u','ょ':'o','ぁ':'a','ぃ':'i','ぅ':'u','ぇ':'e','ぉ':'o'});
const SMALL='ゃゅょぁぃぅぇぉっ';

function longVowelVariants(r){
  const out=[]; const c=[...r];
  for(let i=1;i<c.length;i++){
    if(c[i]==='う'&&(KVOWEL[c[i-1]]==='o'||KVOWEL[c[i-1]]==='u')) out.push(c.slice(0,i).concat(c.slice(i+1)).join(''));
    if(c[i]==='い'&&(KVOWEL[c[i-1]]==='i'||KVOWEL[c[i-1]]==='e')) out.push(c.slice(0,i).concat(c.slice(i+1)).join(''));
  }
  for(let i=0;i<c.length;i++){
    const v=KVOWEL[c[i]];
    if(v==='o'||v==='u') out.push(c.slice(0,i+1).concat('う',c.slice(i+1)).join(''));
    if(v==='e'||v==='i') out.push(c.slice(0,i+1).concat('い',c.slice(i+1)).join(''));
  }
  return out;
}
function voiceVariants(r){
  const out=[]; const c=[...r];
  for(let i=0;i<c.length;i++){
    const ch=c[i]; const alts=[];
    if(VOICE[ch])alts.push(VOICE[ch]); if(HANDA[ch])alts.push(HANDA[ch]);
    if(UNVOICE[ch])alts.push(UNVOICE[ch]); if(UNHANDA[ch])alts.push(UNHANDA[ch]);
    alts.forEach(a=>{ const cc=c.slice(); cc[i]=a; out.push(cc.join('')); });
  }
  return out;
}
function vowelShiftVariants(r){
  const out=[]; const c=[...r];
  for(let i=0;i<c.length;i++){
    if(SMALL.includes(c[i])||(i+1<c.length&&SMALL.includes(c[i+1]))) continue;
    for(const row of GYOU){ const idx=row.indexOf(c[i]);
      if(idx>=0){ row.forEach(a=>{ if(a&&a!==c[i]){ const cc=c.slice(); cc[i]=a; out.push(cc.join('')); } }); break; } }
  }
  return out;
}
function tsuVariants(r){
  const out=[]; const c=[...r];
  for(let i=0;i<c.length;i++) if(c[i]==='っ') out.push(c.slice(0,i).concat(c.slice(i+1)).join(''));
  const ok='かきくけこさしすせそたちつてとぱぴぷぺぽ';
  for(let i=1;i<c.length;i++) if(ok.includes(c[i])&&c[i-1]!=='っ'&&c[i-1]!=='ん') out.push(c.slice(0,i).concat('っ',c.slice(i)).join(''));
  return out;
}
const isKana=ch=>/[ぁ-ゖー]/.test(ch);
// 読みのうち「漢字が担う部分」の範囲を返す（前後の送り仮名を除外）
function kanjiSpan(w, r){
  const wc=[...w], rc=[...r];
  let p=0; while(p<wc.length&&p<rc.length&&isKana(wc[p])&&wc[p]===rc[p]) p++;
  let i=wc.length-1, j=rc.length-1, s=0;
  while(i>=p&&j>=p&&isKana(wc[i])&&wc[i]===rc[j]){ i--; j--; s++; }
  return {start:p, end:rc.length-s};
}
// 漢字読み問題として「良問」か？ 漢字が担う読みが送り仮名より長いこと
function goodReading(d){
  if(!d.hk||!d.r) return false;
  const {start,end}=kanjiSpan(d.w, d.r);
  const hidden=end-start;            // 漢字由来の読みの長さ
  const okuri=start+(d.r.length-end);// 見えている送り仮名の長さ
  return hidden>=1 && hidden>=okuri; // 漢字の読みが送り仮名以上（仮名だらけの語を除外）
}
function genReadingDistractors(d, n){
  const reading=d.r;
  const {start,end}=kanjiSpan(d.w, reading);
  const rc=[...reading];
  const pre=rc.slice(0,start).join(''), mid=rc.slice(start,end).join(''), suf=rc.slice(end).join('');
  const wrap=arr=>arr.map(v=>pre+v+suf);
  const buckets=[shuffle(wrap(longVowelVariants(mid))),shuffle(wrap(voiceVariants(mid))),
    shuffle(wrap(tsuVariants(mid))),shuffle(wrap(vowelShiftVariants(mid)))];
  const seen=new Set([reading]); const res=[]; let added=true;
  while(res.length<n&&added){ added=false;
    for(const b of buckets){
      while(b.length){ const v=b.shift();
        if(v&&v!==reading&&!seen.has(v)&&v.length>=1){ seen.add(v); res.push(v); added=true; break; } }
      if(res.length>=n) break;
    }
  }
  return res;
}

function getDistractors(type, target, pool, n){
  n=n||3;
  if(type==='reading'){
    const res=genReadingDistractors(target, n).map(v=>({val:v, word:null}));
    if(res.length<n){ // 足りなければ他語の読みで補完
      const seen=new Set([target.r,...res.map(x=>x.val)]);
      const extra=shuffle(pool.filter(d=>d.id!==target.id&&goodReading(d)));
      for(const d of extra){ if(res.length>=n)break; if(!seen.has(d.r)){seen.add(d.r);res.push({val:d.r,word:d});} }
    }
    return res;
  }
  const getVal=GETVAL[type];
  let cand = shuffle(pool.filter(d=>d.id!==target.id && d.cat===target.cat))
    .concat(shuffle(pool.filter(d=>d.id!==target.id && d.cat!==target.cat)))
    .concat(shuffle(ALL_DATA.filter(d=>d.id!==target.id)));
  if(type==='synonym') cand=cand.filter(d=>d.syn);
  if(type==='kanji') cand=cand.filter(d=>d.hk);
  const seen=new Set([getVal(target)]); const res=[];
  for(const d of cand){ const v=getVal(d); if(v&&!seen.has(v)){seen.add(v);res.push({val:v,word:d}); if(res.length>=n)break;} }
  return res;
}

function typePool(type, pool){
  if(type==='meaning') return pool.filter(d=>d.m);
  if(type==='cloze') return pool.filter(d=>d.ej && findSurface(d));
  if(type==='synonym') return pool.filter(d=>d.syn);
  if(type==='reading') return pool.filter(goodReading);
  if(type==='kanji') return pool.filter(d=>d.hk);
  return [];
}
function buildSession(){
  const cats = settings.cats.length ? settings.cats : CAT_ORDER;
  let pool = ALL_DATA.filter(d=>cats.includes(d.cat));
  if(settings.wrongOnly) pool=pool.filter(d=>(wrongCounts[d.id]||0)>0);
  let qs=[];
  settings.types.forEach(t=>{ typePool(t,pool).forEach(d=>qs.push({type:t,d})); });
  qs=shuffle(qs);
  const n = settings.count===0 ? qs.length : Math.min(settings.count, qs.length);
  return qs.slice(0,n);
}

// ---------- quiz runtime ----------
let session=[], qi=0;
const opts=document.getElementById('opts'), qfb=document.getElementById('qfb'),
      qnext=document.getElementById('qnext'), qtype=document.getElementById('qtype'),
      qcat=document.getElementById('qcat'), qbody=document.getElementById('qbody'),
      qcard=document.getElementById('qcard'), qprogbar=document.getElementById('qprogbar');

function extFor(type, w){
  if(!w) return '';
  if(type==='meaning') return `${w.w}${w.w!==w.r?`（${w.r}）`:''}`;
  if(type==='cloze') return `${w.w}：${w.ej||''}`;
  if(type==='synonym') return `${w.w}：${w.m}`;
  if(type==='reading') return `${w.w}：${w.m}`;
  if(type==='kanji') return `${w.r}：${w.m}`;
  return '';
}
function renderQ(){
  const q=session[qi];
  qfb.textContent=''; qfb.style.color=''; qnext.style.display='none'; opts.innerHTML='';
  document.getElementById('qidx').textContent=qi+1;
  document.getElementById('qlen').textContent=session.length;
  qprogbar.style.width = (qi/session.length*100)+'%';
  qtype.textContent = TYPES[q.type].icon+' '+TYPES[q.type].label;
  qcat.textContent = '・'+q.d.cat;
  const d=q.d;
  // prompt
  qbody.className='qbody jp';
  if(q.type==='meaning'){
    qbody.classList.add('word'); qbody.innerHTML=`${d.w}<span class="qq">の意味は？</span>`;
  }else if(q.type==='cloze'){
    qbody.classList.add('cloze');
    const surf=findSurface(d);
    qbody.innerHTML=d.ej.replace(surf,'<span class="blank">？</span>')+`<span class="qq">？に入る語は？</span>`;
  }else if(q.type==='synonym'){
    qbody.classList.add('word'); qbody.innerHTML=`${d.w}<span class="qq">に近い意味は？</span>`;
  }else if(q.type==='reading'){
    qbody.classList.add('word'); qbody.innerHTML=`${d.w}<span class="qq">の読み方は？</span>`;
  }else if(q.type==='kanji'){
    qbody.classList.add('word'); qbody.innerHTML=`${d.r}<span class="qq">（${d.m}）の漢字は？</span>`;
  }
  // options
  const correctVal=GETVAL[q.type](d);
  const pool = ALL_DATA;
  const distract=getDistractors(q.type, d, pool, 3);
  let entries=[{val:correctVal, word:d, ok:true}].concat(distract.map(x=>({val:x.val, word:x.word, ok:false})));
  entries=shuffle(entries);
  entries.forEach(en=>{
    const b=document.createElement('button'); b.className='opt'+(q.type!=='meaning'&&q.type!=='synonym'?' jp':'');
    b.innerHTML=`<span class="olab"></span><span class="oext"></span>`;
    b.querySelector('.olab').textContent=en.val;
    b.onclick=()=>answer(b, en, entries);
    opts.appendChild(b);
  });
}
function answer(btn, en, entries){
  total++;
  [...opts.children].forEach((b,idx)=>{
    b.disabled=true;
    const e=entries[idx];
    if(e.ok) b.classList.add('right');
    b.querySelector('.oext').textContent = extFor(session[qi].type, e.word);
  });
  if(en.ok){
    correct++; streak++; qfb.textContent='◎ 正解！えらい😈'; qfb.style.color='#1f8a4c';
  }else{
    btn.classList.add('wrong'); streak=0;
    qfb.textContent='✗ せいかいは「'+GETVAL[session[qi].type](session[qi].d)+'」'; qfb.style.color='#FF5C5C';
    markWrong(session[qi].d.id);
  }
  document.getElementById('streak').textContent=streak;
  document.getElementById('correct').textContent=correct;
  document.getElementById('total').textContent=total;
  qprogbar.style.width=((qi+1)/session.length*100)+'%';
  save(); updateStatsBar();
  qnext.style.display='inline-block';
  qnext.textContent = (qi>=session.length-1)?'けっか →':'つぎへ →';
}
qnext.onclick=()=>{ if(qi>=session.length-1){ showEnd(); } else { qi++; renderQ(); } };

let sessRight=0, sessTotal=0;
function showEnd(){
  const done=qi+1;
  // count this session by recomputing from progress: simpler -> track per session
  qprogbar.style.width='100%';
  const r=sessionCorrect, t=session.length;
  const pct = t? Math.round(r/t*100):0;
  const face = pct>=90?'😇':pct>=70?'😈':pct>=50?'🙂':'😵';
  const msg = pct>=90?'かんぺき！あくまも降参😇':pct>=70?'いい調子！この調子で😈':pct>=50?'まあまあ ・ 復習でのびるよ':'むずかしかったね ・ 図鑑で見直そう';
  qcard.innerHTML=`<div class="qend">
     <div class="big">${face}</div>
     <div class="sc">${r} / ${t}　(${pct}%)</div>
     <div class="ms">${msg}<br>まちがえた語は図鑑で色がついてるよ🩸</div>
     <button class="qnext" id="againBtn">🔁 もう一回</button>
   </div>`;
  document.getElementById('againBtn').onclick=startSession;
}
let sessionCorrect=0;
function startSession(){
  session=buildSession();
  if(!session.length){
    qcard.innerHTML=`<div class="qend"><div class="big">🫥</div><div class="ms">この条件だと出題できる語がないよ。<br>設定でタイプや範囲をひろげてね。</div><button class="qnext" id="toSet">⚙️ 設定へ</button></div>`;
    document.getElementById('toSet').onclick=()=>showView('set');
    return;
  }
  qi=0; sessionCorrect=0;
  // rebuild qcard skeleton (in case it was replaced by end screen)
  qcard.innerHTML=`
    <div class="qscore">問題 <span id="qidx">1</span>/<span id="qlen">0</span> ・ 連続 <span class="st" id="streak">0</span> ・ 正解 <span id="correct">0</span>/<span id="total">0</span></div>
    <div class="qtype jp"><span id="qtype"></span><span class="qcat" id="qcat"></span></div>
    <div class="qbody jp" id="qbody"></div>
    <div class="opts" id="opts"></div>
    <div class="qfb jp" id="qfb"></div>
    <button class="qnext" id="qnext" style="display:none">つぎへ →</button>`;
  rebind();
  renderQ();
}
// because qcard innerHTML is rebuilt, rebind element refs + handlers
let R={};
function rebind(){
  R.opts=document.getElementById('opts'); R.qfb=document.getElementById('qfb');
  R.qnext=document.getElementById('qnext'); R.qtype=document.getElementById('qtype');
  R.qcat=document.getElementById('qcat'); R.qbody=document.getElementById('qbody');
}

// To keep things simple & robust, re-implement renderQ/answer using live lookups:
function $(id){return document.getElementById(id);}
function renderQ(){
  const q=session[qi];
  $('qfb').textContent=''; $('qfb').style.color=''; $('qnext').style.display='none'; $('opts').innerHTML='';
  $('qidx').textContent=qi+1; $('qlen').textContent=session.length;
  qprogbar.style.width=(qi/session.length*100)+'%';
  $('qtype').textContent=TYPES[q.type].icon+' '+TYPES[q.type].label;
  $('qcat').textContent='';
  const d=q.d, b=$('qbody'); b.className='qbody jp';
  if(q.type==='meaning'){ b.classList.add('word'); b.innerHTML=`${d.w}<span class="qq">の意味は？</span>`; }
  else if(q.type==='cloze'){ b.classList.add('cloze'); const s=findSurface(d); b.innerHTML=d.ej.replace(s,'<span class="blank">？</span>')+`<span class="qq">？に入る語は？</span>`; }
  else if(q.type==='synonym'){ b.classList.add('word'); b.innerHTML=`${d.w}<span class="qq">に近い意味は？</span>`; }
  else if(q.type==='reading'){ b.classList.add('word'); b.innerHTML=`${d.w}<span class="qq">の読み方は？</span>`; }
  else if(q.type==='kanji'){ b.classList.add('word'); b.innerHTML=`${d.r}<span class="qq">の漢字は？</span>`; }
  const correctVal=GETVAL[q.type](d);
  const distract=getDistractors(q.type,d,ALL_DATA,3);
  let entries=[{val:correctVal,word:d,ok:true}].concat(distract.map(x=>({val:x.val,word:x.word,ok:false})));
  entries=shuffle(entries);
  const op=$('opts');
  entries.forEach(en=>{
    const btn=document.createElement('button');
    btn.className='opt'+((q.type==='cloze'||q.type==='reading'||q.type==='kanji')?' jp':'');
    btn.innerHTML=`<span class="olab"></span><span class="oext"></span>`;
    btn.querySelector('.olab').textContent=en.val;
    btn.onclick=()=>answer(btn,en,entries);
    op.appendChild(btn);
  });
}
function answer(btn,en,entries){
  total++;
  const q=session[qi];
  [...$('opts').children].forEach((b,idx)=>{
    b.disabled=true;
    if(entries[idx].ok) b.classList.add('right');
    b.querySelector('.oext').textContent=extFor(q.type, entries[idx].word);
  });
  if(en.ok){ correct++; streak++; sessionCorrect++; $('qfb').textContent='◎ 正解！えらい😈'; $('qfb').style.color='#1f8a4c'; }
  else{ btn.classList.add('wrong'); streak=0; $('qfb').textContent='✗ せいかいは「'+GETVAL[q.type](q.d)+'」'; $('qfb').style.color='#FF5C5C'; markWrong(q.d.id); }
  $('streak').textContent=streak; $('correct').textContent=correct; $('total').textContent=total;
  qprogbar.style.width=((qi+1)/session.length*100)+'%';
  save(); updateStatsBar();
  const nx=$('qnext'); nx.style.display='inline-block';
  nx.textContent=(qi>=session.length-1)?'けっか →':'つぎへ →';
  nx.onclick=()=>{ if(qi>=session.length-1) showEnd(); else { qi++; renderQ(); } };
}

// ---------- settings UI ----------
function buildSettings(){
  const tt=document.getElementById('typeTogs'); tt.innerHTML='';
  Object.keys(TYPES).forEach(t=>{
    const b=document.createElement('button');
    b.className='tog'+(settings.types.includes(t)?' on':'');
    b.textContent=TYPES[t].icon+' '+TYPES[t].label;
    b.onclick=()=>{
      if(settings.types.includes(t)){ if(settings.types.length>1) settings.types=settings.types.filter(x=>x!==t); }
      else settings.types.push(t);
      save(); buildSettings(); updateHint();
    };
    tt.appendChild(b);
  });
  const ct=document.getElementById('catTogs'); ct.innerHTML='';
  const counts={}; ALL_DATA.forEach(d=>counts[d.cat]=(counts[d.cat]||0)+1);
  CAT_ORDER.forEach(cat=>{
    if(!counts[cat]) return;
    const b=document.createElement('button');
    b.className='tog'+(settings.cats.includes(cat)?' on':'');
    b.textContent=catMeta(cat).i+' '+cat;
    b.onclick=()=>{
      if(settings.cats.includes(cat)) settings.cats=settings.cats.filter(x=>x!==cat);
      else settings.cats.push(cat);
      save(); buildSettings(); updateHint();
    };
    ct.appendChild(b);
  });
  const cnt=document.getElementById('countTogs'); cnt.innerHTML='';
  [10,20,30,50,0].forEach(n=>{
    const b=document.createElement('button');
    b.className='tog'+(settings.count===n?' on':'');
    b.textContent=n===0?'全部':n+'問';
    b.onclick=()=>{ settings.count=n; save(); buildSettings(); updateHint(); };
    cnt.appendChild(b);
  });
  const wt=document.getElementById('wrongTogs'); wt.innerHTML='';
  [['off','OFF ・ ぜんぶ'],['on','ON ・ ✗のみ']].forEach(([v,lab])=>{
    const b=document.createElement('button');
    const on=(v==='on')===settings.wrongOnly;
    b.className='tog'+(on?' on':'');
    b.textContent=lab;
    b.onclick=()=>{ settings.wrongOnly=(v==='on'); save(); buildSettings(); updateHint(); };
    wt.appendChild(b);
  });
  updateHint();
}
function updateHint(){
  const avail=buildSession().length;
  // buildSession is capped by count; compute raw count separately
  const cats=settings.cats.length?settings.cats:CAT_ORDER;
  let pool=ALL_DATA.filter(d=>cats.includes(d.cat));
  if(settings.wrongOnly) pool=pool.filter(d=>(wrongCounts[d.id]||0)>0);
  let raw=0; settings.types.forEach(t=>raw+=typePool(t,pool).length);
  document.getElementById('setHint').textContent=
    `この条件で作れる問題：約 ${raw} 問` + (settings.wrongOnly && raw===0 ? '（まだ誤答がないよ）':'');
}

// ---------- view switch ----------
const gV=document.getElementById('galleryView'),qV=document.getElementById('quizView'),sV=document.getElementById('setView');
const mG=document.getElementById('mGallery'),mQ=document.getElementById('mQuiz'),mS=document.getElementById('mSet');
function showView(v){
  [mG,mQ,mS].forEach(b=>b.classList.remove('on'));
  gV.style.display='none'; qV.classList.remove('show'); sV.style.display='none';
  if(v==='gallery'){ mG.classList.add('on'); gV.style.display=''; buildChips(); renderGrid(); renderLegend(); updateStatsBar(); }
  else if(v==='quiz'){ mQ.classList.add('on'); qV.classList.add('show'); startSession(); }
  else { mS.classList.add('on'); sV.style.display=''; buildSettings(); }
}
mG.onclick=()=>showView('gallery');
mQ.onclick=()=>showView('quiz');
mS.onclick=()=>showView('set');
document.getElementById('startQuiz').onclick=()=>showView('quiz');

document.getElementById('clearAll').onclick=()=>{
  if(!confirm('全ての記録（誤字・クイズ成績）を消去しますか？')) return;
  wrongCounts={}; streak=0; correct=0; total=0;
  save(); updateStatsBar(); renderGrid(); renderLegend();
  showToast('🗑️ 全ての記録を消去しました');
};

document.getElementById('vnum').textContent=APP_VERSION;
load();
buildChips(); renderGrid(); renderLegend(); feature(); updateStatsBar();
